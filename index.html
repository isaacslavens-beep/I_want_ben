<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queens vs Laurier - Thank You</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --purple: #4b2e83;
            --yellow: #fdd835;
            --white: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--purple);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        h1 {
            font-size: 3.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--yellow);
            margin-bottom: 5px;
            font-weight: 900;
        }

        .location {
            font-size: 1.3rem;
            font-weight: 400;
            margin-bottom: 40px;
            opacity: 0.8;
            letter-spacing: 1px;
        }

        .thank-you-container {
            background: rgba(255, 255, 255, 0.05);
            padding: 50px;
            border-radius: 20px;
            border: 1px solid rgba(253, 216, 53, 0.3);
            margin-bottom: 40px;
            max-width: 600px;
        }

        .thank-you-text {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--white);
            margin: 0;
            line-height: 1.2;
        }

        .sub-text {
            font-size: 1.1rem;
            margin-top: 15px;
            color: var(--yellow);
            font-weight: 400;
            letter-spacing: 1px;
        }

        .roster-label {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 20px;
            color: rgba(255, 255, 255, 0.6);
        }

        .roster {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--white);
        }

        .roster span {
            display: inline-block;
            margin: 0 15px;
            position: relative;
        }

        .roster span:not(:last-child)::after {
            content: "•";
            position: absolute;
            right: -20px;
            color: var(--yellow);
        }

        /* Mobile Optimization */
        @media (max-width: 600px) {
            .thank-you-container { padding: 30px 20px; width: 85%; }
            .thank-you-text { font-size: 1.8rem; }
            h1 { font-size: 2.2rem; }
            .roster { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <h1>Queens vs Laurier</h1>
    <div class="location">Carrville Community Centre</div>

    <div class="thank-you-container">
        <p class="thank-you-text">THANK YOU FOR YOUR SUPPORT!</p>
        <p class="sub-text">We look forward to seeing you next time.</p>
    </div>

    <div class="roster">
        <span>Ben</span>
        <span>Glazer</span>
        <span>Eitan</span>
        <span>Isaac</span>
        <span>Spencer</span>
        <span>Moshe</span>
    </div>

</body>
</html>
