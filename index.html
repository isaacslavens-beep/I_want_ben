<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queens vs Laurier - Cancelled</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --purple: #4b2e83;
            --yellow: #fdd835;
            --white: #ffffff;
            --red: #ff5252;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--purple);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        h1 {
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--yellow);
            margin-bottom: 10px;
        }

        .location {
            font-size: 1.2rem;
            font-weight: 400;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        .alert-box {
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid var(--red);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 80%;
        }

        .status-title {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--red);
            text-transform: uppercase;
            margin: 0;
        }

        .status-message {
            font-size: 1.2rem;
            line-height: 1.6;
        }

        .contact-link {
            color: var(--yellow);
            text-decoration: none;
            font-weight: 700;
            border-bottom: 2px solid transparent;
            transition: border-color 0.3s;
        }

        .contact-link:hover {
            border-color: var(--yellow);
        }

        .roster {
            margin-top: 50px;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--white);
            opacity: 0.6; /* Faded as event is cancelled */
        }

        .roster span {
            display: inline-block;
            margin: 0 15px;
            position: relative;
        }

        .roster span:not(:last-child)::after {
            content: "•";
            position: absolute;
            right: -20px;
            color: var(--yellow);
        }

        /* Mobile Optimization */
        @media (max-width: 600px) {
            .alert-box { padding: 25px; }
            .status-title { font-size: 1.8rem; }
            h1 { font-size: 1.8rem; }
            .roster { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <h1>Queens vs Laurier</h1>
    <div class="location">Carrville Community Centre</div>

    <div class="alert-box">
        <p class="status-title">Event Cancelled</p>
        <p class="status-message">
            Due to <strong>inclement weather (heavy rain)</strong>, the scheduled matchup has been cancelled for player safety.<br><br>
            For more information, please contact the <br>
            <a href="mailto:resultscommitteeinfo@gmail.com" class="contact-link">resultscommitteeinfo@gmail.com</a>
        </p>
    </div>

    <div class="roster">
        <span>Ben</span>
        <span>Glazer</span>
        <span>Eitan</span>
        <span>Isaac</span>
        <span>Spencer</span>
    </div>

</body>
</html>
