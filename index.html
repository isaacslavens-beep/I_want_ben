<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queens vs Laurier Countdown</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --purple: #4b2e83;
            --yellow: #fdd835;
            --white: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--purple);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        h1 {
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--yellow);
            margin-bottom: 10px;
        }

        .location {
            font-size: 1.2rem;
            font-weight: 400;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        #countdown {
            display: flex;
            gap: 20px;
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 20px;
            border: 2px solid var(--yellow);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .time-box {
            display: flex;
            flex-direction: column;
        }

        .time-value {
            font-size: 4rem;
            font-weight: 900;
            color: var(--yellow);
            line-height: 1;
        }

        .time-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            margin-top: 5px;
            letter-spacing: 1px;
        }

        .roster {
            margin-top: 50px;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--white);
        }

        .roster span {
            display: inline-block;
            margin: 0 15px;
            position: relative;
        }

        .roster span:not(:last-child)::after {
            content: "•";
            position: absolute;
            right: -20px;
            color: var(--yellow);
        }

        /* Mobile Optimization */
        @media (max-width: 600px) {
            #countdown { gap: 10px; padding: 15px; }
            .time-value { font-size: 2rem; }
            h1 { font-size: 1.8rem; }
            .roster { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <h1>Queens vs Laurier</h1>
    <div class="location">Carrville Community Centre</div>

    <div id="countdown">
        <div class="time-box">
            <span class="time-value" id="days">00</span>
            <span class="time-label">Days</span>
        </div>
        <div class="time-box">
            <span class="time-value" id="hours">00</span>
            <span class="time-label">Hours</span>
        </div>
        <div class="time-box">
            <span class="time-value" id="minutes">00</span>
            <span class="time-label">Mins</span>
        </div>
        <div class="time-box">
            <span class="time-value" id="seconds">00</span>
            <span class="time-label">Secs</span>
        </div>
    </div>

    <div class="roster">
        <span>Ben</span>
        <span>Glazer</span>
        <span>Eitan</span>
        <span>Isaac</span>
        <span>Spencer</span>

    </div>

    <script>
        const targetDate = new Date("April 25, 2026 14:00:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = days.toString().padStart(2, '0');
            document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');

            if (distance < 0) {
                clearInterval(interval);
                document.getElementById("countdown").innerHTML = "<h2>GAME TIME!</h2>";
            }
        }

        const interval = setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
