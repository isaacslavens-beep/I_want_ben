<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queens vs Laurier - Thank You</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --purple: #4b2e83;
            --yellow: #fdd835;
            --white: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--purple);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        /* Hat Image Styling */
        .hat-img {
            position: absolute;
            width: 250px; /* Adjust based on your image size */
            height: auto;
            z-index: 5;
            pointer-events: none; /* Prevents images from interfering with clicks */
        }

        .red-hat {
            top: 5%;
            left: 5%;
            transform: rotate(-15deg);
        }

        .blue-hat {
            bottom: 5%;
            right: 5%;
            transform: rotate(15deg);
        }

        h1 {
            font-size: 3.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--yellow);
            margin-bottom: 5px;
            font-weight: 900;
            position: relative;
            z-index: 10;
        }

        .location {
            font-size: 1.3rem;
            font-weight: 400;
            margin-bottom: 40px;
            opacity: 0.8;
            letter-spacing: 1px;
            position: relative;
            z-index: 10;
        }

        .thank-you-container {
            background: rgba(255, 255, 255, 0.05);
            padding: 50px;
            border-radius: 20px;
            border: 2px solid var(--yellow);
            margin-bottom: 40px;
            max-width: 700px;
            position: relative;
            z-index: 10;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .thank-you-text {
            font-size: 2.8rem;
            font-weight: 900;
            color: var(--white);
            margin: 0;
            line-height: 1.2;
        }

        .sub-text {
            font-size: 1.2rem;
            margin-top: 15px;
            color: var(--white);
            opacity: 0.9;
            font-weight: 400;
            letter-spacing: 1px;
        }

        .roster {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--white);
            position: relative;
            z-index: 10;
        }

        .roster span {
            display: inline-block;
            margin: 0 15px;
            position: relative;
        }

        .roster span:not(:last-child)::after {
            content: "•";
            position: absolute;
            right: -20px;
            color: var(--yellow);
        }

        /* Mobile Optimization */
        @media (max-width: 600px) {
            .hat-img { width: 120px; }
            .thank-you-container { padding: 30px 20px; width: 85%; }
            .thank-you-text { font-size: 1.8rem; }
            h1 { font-size: 2.2rem; }
            .roster { font-size: 1rem; }
            .roster span { margin: 0 10px; }
            .roster span:not(:last-child)::after { right: -15px; }
        }
    </style>
</head>
<body>

    <img src="red-hat.png" alt="Red Hat" class="hat-img red-hat">
    <img src="blue-hat.png" alt="Blue Hat" class="hat-img blue-hat">

    <h1>Queens vs Laurier</h1>
    <div class="location">Carrville Community Centre</div>

    <div class="thank-you-container">
        <p class="thank-you-text">THANK YOU FOR YOUR SUPPORT!</p>
        <p class="sub-text">We look forward to seeing you next time.</p>
    </div>

    <div class="roster">
        <span>Ben</span>
        <span>Glazer</span>
        <span>Eitan</span>
        <span>Isaac</span>
        <span>Spencer</span>
        <span>Moshe</span>
    </div>

</body>
</html>
